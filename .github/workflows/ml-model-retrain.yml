name: ML Model Retrain

on:
  push:
    # Retrain on main (release) and legacy feature branch
    branches: [main, feat/ml-pipeline]
  schedule:
    # Run weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write  # push model updates

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r ml-model/requirements.txt

      - name: Export features from GHSA and known-good
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ml-model/export-features.js \
            --from-ghsa --limit 200 \
            --out ml-model/train.jsonl

      - name: Deduplicate training data
        run: npm run ml:dedup

      - name: Train dependency confusion model
        run: |
          cd ml-model && python3 train.py \
            --input train.jsonl \
            --output model.pkl \
            --balance \
            --calibrate

      - name: Export behavioral features (GHSA + known-good, fresh file)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node ml-model/export-behavioral-features.js \
            --overwrite \
            --from-ghsa --limit 200 \
            --out ml-model/train-behavioral.jsonl

      - name: Deduplicate behavioral training data
        run: node ml-model/dedup-train.js ml-model/train-behavioral.jsonl ml-model/train-behavioral.jsonl

      - name: Train behavioral model
        run: |
          cd ml-model && python3 train-behavioral.py \
            --input train-behavioral.jsonl \
            --balance \
            --calibrate

      - name: Check for model changes
        id: changes
        run: |
          git diff --quiet \
            ml-model/train.jsonl ml-model/model.pkl ml-model/metadata.json ml-model/feature_keys.pkl \
            ml-model/train-behavioral.jsonl ml-model/behavioral-model.pkl ml-model/behavioral-metadata.json ml-model/behavioral-feature_keys.pkl \
            2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push model updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml-model/train.jsonl ml-model/model.pkl ml-model/metadata.json ml-model/feature_keys.pkl \
            ml-model/train-behavioral.jsonl ml-model/behavioral-model.pkl ml-model/behavioral-metadata.json ml-model/behavioral-feature_keys.pkl
          git commit -m "chore(ml): retrain dependency and behavioral models from GHSA [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
