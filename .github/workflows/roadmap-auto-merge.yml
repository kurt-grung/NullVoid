name: Roadmap auto-merge

on:
  workflow_run:
    workflows:
      - Tests
      - NullVoid Security Scan
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  squash-merge-when-green:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Find roadmap PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const headBranch = run.head_branch;
            const headSha = run.head_sha;

            if (!headBranch?.startsWith('feat/issue-')) {
              core.info(`Skip: branch ${headBranch} is not a roadmap PR branch`);
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${headBranch}`,
            });

            const pr = prs.find((p) => p.head.sha === headSha) ?? prs[0];
            if (!pr) {
              core.info('No open PR for workflow run');
              return;
            }

            if (!/Closes\s+#\d+/i.test(pr.body ?? '')) {
              core.info(`PR #${pr.number} has no Closes #N — skip auto-merge`);
              return;
            }

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: headSha,
              per_page: 100,
            });

            const ignoredChecks = new Set([
              'squash-merge-when-green',
              'Roadmap auto-merge',
              'in-progress',
              'done-on-merge',
            ]);

            const relevant = checkRuns.check_runs.filter((c) => !ignoredChecks.has(c.name));
            const incomplete = relevant.filter((c) => c.status !== 'completed');
            const failed = relevant.filter(
              (c) => c.status === 'completed' && c.conclusion !== 'success' && c.conclusion !== 'skipped'
            );

            if (incomplete.length > 0) {
              core.info(`PR #${pr.number}: ${incomplete.length} check(s) still running`);
              return;
            }
            if (failed.length > 0) {
              core.info(`PR #${pr.number}: ${failed.length} check(s) failed — skip merge`);
              return;
            }
            if (relevant.length === 0) {
              core.info(`PR #${pr.number}: no check runs on ${headSha}`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: 'squash',
            });
            core.info(`Squash-merged PR #${pr.number}`);
