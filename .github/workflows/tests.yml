name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: read

# Two jobs so PRs show separate status checks (quality vs tests) for branch protection.
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Format (Prettier)
        run: npm run format:check

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Setup Python for ML eval
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ML train + evaluate (dependency model)
        run: |
          python3 -m pip install -r ml-model/requirements.txt
          cd ml-model
          python3 train.py --input train.jsonl --output /tmp/nullvoid-ci-model.pkl --balance --calibrate
          python3 evaluate.py --input train.jsonl --model /tmp/nullvoid-ci-model.pkl --keys /tmp/feature_keys.pkl --json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
          retention-days: 30
          if-no-files-found: ignore
