name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: read

# Two jobs so PRs show separate status checks (quality vs tests) for branch protection.
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Format (Prettier)
        run: npm run format:check

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Setup Python for ML eval
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python ML dependencies
        run: python3 -m pip install -r ml-model/requirements.txt

      - name: Split JSONL for held-out ML evaluation
        run: |
          python3 ml-model/split_train_val.py \
            --input ml-model/train.jsonl \
            --train-out /tmp/ml-dep-train.jsonl \
            --val-out /tmp/ml-dep-val.jsonl \
            --val-fraction 0.2 --seed 42
          python3 ml-model/split_train_val.py \
            --input ml-model/train-behavioral.jsonl \
            --train-out /tmp/ml-beh-train.jsonl \
            --val-out /tmp/ml-beh-val.jsonl \
            --val-fraction 0.2 --seed 42

      - name: ML train + evaluate (dependency + behavioral, held-out validation)
        run: |
          cd ml-model
          python3 train.py --input /tmp/ml-dep-train.jsonl --output /tmp/nullvoid-ci-model.pkl --balance --calibrate
          python3 evaluate.py --input /tmp/ml-dep-val.jsonl --model /tmp/nullvoid-ci-model.pkl --keys /tmp/feature_keys.pkl --json --eval-set validation > /tmp/ml-dep-metrics.json
          python3 train-behavioral.py --input /tmp/ml-beh-train.jsonl --output-dir /tmp/ml-beh-ci --balance --calibrate
          python3 evaluate.py --behavioral --input /tmp/ml-beh-val.jsonl --model /tmp/ml-beh-ci/behavioral-model.pkl --keys /tmp/ml-beh-ci/behavioral-feature_keys.pkl --json --eval-set validation > /tmp/ml-beh-metrics.json
          cd ..
          python3 -c "import json, pathlib; p=pathlib.Path('ml-eval-report.json'); p.write_text(json.dumps({'dependency': json.load(open('/tmp/ml-dep-metrics.json')), 'behavioral': json.load(open('/tmp/ml-beh-metrics.json'))}, indent=2))"

      - name: Upload ML eval report
        uses: actions/upload-artifact@v4
        with:
          name: ml-eval-report
          path: ml-eval-report.json
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
          retention-days: 30
          if-no-files-found: ignore
